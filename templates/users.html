<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if title %}{{ title }} — {% endif %}Каталог продуктов</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<nav class="top-strip">
  <div class="container top-strip-inner">
    <a class="brand-link" href="/">Каталог продуктов</a>
    <div class="nav-links-wrap">
      <a class="mini-nav-link d-none" id="nav-users" href="/admin/users">Пользователи</a>
    </div>
    <div class="user-panel">
      <span id="nav-user"></span>
      <a class="btn btn-sm btn-outline-light d-none" id="nav-logout" href="#" role="button">Выход</a>
      <a class="btn btn-sm btn-light" id="nav-login" href="/login">Вход</a>
    </div>
  </div>
</nav>
<main class="container pb-5 page-shell">
<h1 class="page-title-jun">Пользователи</h1>
<div class="table-responsive box-jun">
  <table class="table table-striped" id="users-table" style="display:none">
    <thead>
      <tr><th>Имя</th><th>Роль</th><th>Блок</th><th></th></tr>
    </thead>
    <tbody id="user-list"></tbody>
  </table>
</div>
<div class="modal fade" id="m-user" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content" id="f-user">
      <div class="modal-header">
        <h5 class="modal-title">Пользователь</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="u-id" />
        <div class="mb-2">
          <label class="form-label" for="u-pass">Новый пароль (пусто — не менять)</label>
          <input type="password" class="form-control" id="u-pass" autocomplete="new-password" />
        </div>
        <div class="mb-2">
          <label class="form-label" for="u-role">Роль</label>
          <select class="form-select" id="u-role">
            <option value="simple">Простой пользователь</option>
            <option value="advanced">Продвинутый пользователь</option>
            <option value="admin">Администратор</option>
          </select>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="u-block" />
          <label class="form-check-label" for="u-block">Заблокирован</label>
        </div>
        <p class="text-danger small" id="u-err"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </div>
    </form>
  </div>
</div>
<div class="card mt-3 box-jun" id="new-user-wrap" style="display:none">
  <div class="card-body">
    <h2 class="h5">Создать пользователя</h2>
    <form class="row g-2" id="f-new-user">
      <div class="col-md-3"><input class="form-control" name="username" placeholder="Имя" required /></div>
      <div class="col-md-3"><input class="form-control" name="password" type="password" placeholder="Пароль" required /></div>
      <div class="col-md-3">
        <select class="form-select" name="role">
          <option value="simple">Простой</option>
          <option value="advanced">Продвинутый</option>
          <option value="admin">Администратор</option>
        </select>
      </div>
      <div class="col-md-2"><button class="btn btn-primary" type="submit">Создать</button></div>
    </form>
    <p class="text-danger small mt-2" id="nu-err"></p>
    <p class="text-success small mt-1 mb-0" id="nu-ok"></p>
  </div>
</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const TOKEN_KEY = "pc_token";
function getToken() {
  return localStorage.getItem(TOKEN_KEY);
}
function authHeaders() {
  const t = getToken();
  return t ? { Authorization: "Bearer " + t } : {};
}
async function apiFetch(path, init = {}) {
  const h = { ...authHeaders(), ...(init.headers || {}) };
  if (init.body && !h["Content-Type"]) h["Content-Type"] = "application/json";
  const r = await fetch(path, { ...init, headers: h });
  if (r.status === 401 && getToken()) {
    localStorage.removeItem(TOKEN_KEY);
    if (!path.includes("auth/login")) location.href = "/login";
  }
  return r;
}
let __me = null;
let __ueModal = null;

async function loadMe() {
  if (!getToken()) return null;
  const r = await apiFetch("/api/auth/me", { method: "GET" });
  if (!r.ok) return null;
  __me = await r.json();
  return __me;
}
function isRole() {
  if (!__me) return false;
  for (let i = 0; i < arguments.length; i++) {
    if (arguments[i] === __me.role) return true;
  }
  return false;
}
function showNav() {
  const u = document.getElementById("nav-user");
  const login = document.getElementById("nav-login");
  const out = document.getElementById("nav-logout");
  const nUsers = document.getElementById("nav-users");
  if (u) u.textContent = __me ? __me.username + " (" + __me.role_display + ")" : "Гость";
  if (login) login.classList.toggle("d-none", !!__me);
  if (out) {
    out.classList.toggle("d-none", !__me);
    out.onclick = (e) => {
      e.preventDefault();
      localStorage.removeItem(TOKEN_KEY);
      location.href = "/";
    };
  }
  if (nUsers) nUsers.classList.toggle("d-none", !isRole("admin"));
}

async function initUsers() {
  await loadMe();
  showNav();
  if (!isRole("admin")) {
    document.querySelector("main")?.insertAdjacentHTML(
      "afterbegin",
      "<p class='alert alert-warning'>Нужны права администратора.</p>"
    );
    return;
  }
  document.getElementById("users-table").style.display = "";
  document.getElementById("new-user-wrap").style.display = "";
  const r = await apiFetch("/api/users", { method: "GET" });
  if (!r.ok) return;
  const data = await r.json();
  const list = document.getElementById("user-list");
  list.textContent = "";
  for (const u of data) {
    const tr = document.createElement("tr");
    tr.innerHTML =
      "<td>" +
      u.username +
      "</td><td>" +
      u.role_display +
      "</td><td>" +
      (u.is_blocked ? "да" : "нет") +
      "</td><td></td>";
    const last = tr.lastChild;
    const b1 = document.createElement("button");
    b1.className = "btn btn-sm btn-primary";
    b1.type = "button";
    b1.textContent = "Изменить";
    b1.addEventListener("click", () => {
      if (!__ueModal) __ueModal = new bootstrap.Modal("#m-user");
      document.getElementById("u-err").textContent = "";
      document.getElementById("u-id").value = u.id;
      document.getElementById("u-pass").value = "";
      document.getElementById("u-role").value = u.role;
      document.getElementById("u-block").checked = u.is_blocked;
      __ueModal.show();
    });
    const b2 = document.createElement("button");
    b2.className = "btn btn-sm btn-outline-danger";
    b2.type = "button";
    b2.textContent = "Удалить";
    b2.addEventListener("click", () => {
      if (!confirm("Удалить " + u.username + "?")) return;
      apiFetch("/api/users/" + u.id, { method: "DELETE" }).then((x) => {
        if (x.status === 204) initUsers();
      });
    });
    last.appendChild(b1);
    last.appendChild(b2);
    list.appendChild(tr);
  }
}

document.getElementById("f-user").addEventListener("submit", async (e) => {
  e.preventDefault();
  const err = document.getElementById("u-err");
  err.textContent = "";
  const id = +document.getElementById("u-id").value;
  const body = {
    role: document.getElementById("u-role").value,
    is_blocked: document.getElementById("u-block").checked,
  };
  const pw = document.getElementById("u-pass").value;
  if (pw) body.password = pw;
  const rs = await apiFetch("/api/users/" + id, { method: "PATCH", body: JSON.stringify(body) });
  if (rs.ok) {
    if (__ueModal) __ueModal.hide();
    initUsers();
  } else {
    err.textContent = ((await rs.json().catch(() => ({}))).detail) || "Ошибка";
  }
});
document.getElementById("f-new-user").addEventListener("submit", async (e) => {
  e.preventDefault();
  const ne = document.getElementById("nu-err");
  const ok = document.getElementById("nu-ok");
  ne.textContent = "";
  if (ok) ok.textContent = "";
  const submitBtn = e.currentTarget.querySelector("button[type='submit']");
  if (submitBtn) submitBtn.disabled = true;
  const fd = new FormData(e.currentTarget);
  const body = {
    username: fd.get("username"),
    password: fd.get("password"),
    role: fd.get("role"),
  };
  try {
    const rs = await apiFetch("/api/users", { method: "POST", body: JSON.stringify(body) });
    if (rs.ok) {
      const created = await rs.json().catch(() => null);
      e.currentTarget.reset();
      await initUsers();
      if (ok) {
        ok.textContent =
          "Пользователь создан" + (created && created.username ? ": " + created.username : "");
      }
    } else {
      ne.textContent = ((await rs.json().catch(() => ({}))).detail) || "Ошибка";
    }
  } catch (_) {
    ne.textContent = "Ошибка сети";
  } finally {
    if (submitBtn) submitBtn.disabled = false;
  }
});
initUsers();
</script>
</body>
</html>
