<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if title %}{{ title }} — {% endif %}Каталог продуктов</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<nav class="top-strip">
  <div class="container top-strip-inner">
    <a class="brand-link" href="/">Каталог продуктов</a>
    <div class="nav-links-wrap">
      <a class="mini-nav-link d-none" id="nav-users" href="/admin/users">Пользователи</a>
    </div>
    <div class="user-panel">
      <span id="nav-user"></span>
      <a class="btn btn-sm btn-outline-light d-none" id="nav-logout" href="#" role="button">Выход</a>
      <a class="btn btn-sm btn-light" id="nav-login" href="/login">Вход</a>
    </div>
  </div>
</nav>
<main class="container pb-5 page-shell">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <h1 class="h3 mb-3">Вход</h1>
      <div class="card shadow-sm">
        <div class="card-body">
          <form id="f-login" autocomplete="on">
            <div class="mb-2">
              <label class="form-label" for="u">Имя</label>
              <input class="form-control" id="u" name="username" required />
            </div>
            <div class="mb-3">
              <label class="form-label" for="p">Пароль</label>
              <input type="password" class="form-control" id="p" name="password" required />
            </div>
            <p class="text-danger small" id="err"></p>
            <button type="submit" class="btn btn-success w-100">Войти</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const TOKEN_KEY = "pc_token";
function getToken() {
  return localStorage.getItem(TOKEN_KEY);
}
function authHeaders() {
  const t = getToken();
  return t ? { Authorization: "Bearer " + t } : {};
}
async function apiFetch(path, init = {}) {
  const h = { ...authHeaders(), ...(init.headers || {}) };
  if (init.body && !h["Content-Type"]) h["Content-Type"] = "application/json";
  const r = await fetch(path, { ...init, headers: h });
  if (r.status === 401 && getToken()) {
    localStorage.removeItem(TOKEN_KEY);
    if (!path.includes("auth/login")) location.href = "/login";
  }
  return r;
}
let __me = null;
async function loadMe() {
  if (!getToken()) {
    __me = null;
    return null;
  }
  const r = await apiFetch("/api/auth/me", { method: "GET" });
  if (!r.ok) {
    __me = null;
    return null;
  }
  __me = await r.json();
  return __me;
}
function showNav() {
  const u = document.getElementById("nav-user");
  const login = document.getElementById("nav-login");
  const out = document.getElementById("nav-logout");
  if (u) u.textContent = __me ? __me.username + " (" + __me.role_display + ")" : "Гость";
  if (login) login.classList.toggle("d-none", !!__me);
  if (out) {
    out.classList.toggle("d-none", !__me);
    out.onclick = (e) => {
      e.preventDefault();
      localStorage.removeItem(TOKEN_KEY);
      __me = null;
      location.href = "/";
    };
  }
}

document.getElementById("f-login").addEventListener("submit", async (e) => {
  e.preventDefault();
  const err = document.getElementById("err");
  err.textContent = "";
  const fd = new FormData(e.target);
  const body = { username: fd.get("username"), password: fd.get("password") };
  const r = await fetch("/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    err.textContent = (await r.json().catch(() => ({ detail: "Ошибка" }))).detail || "Ошибка";
    return;
  }
  const t = (await r.json()).access_token;
  localStorage.setItem(TOKEN_KEY, t);
  location.href = "/";
});
loadMe().then((m) => {
  showNav();
  if (m) location.href = "/";
});
</script>
</body>
</html>
